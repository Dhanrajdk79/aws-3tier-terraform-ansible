- hosts: app
  become: yes

  tasks:

  - name: install apache
    apt:
      name: apache2
      state: present
      update_cache: yes

  - name: install php
    apt:
      name: php
      state: present

  - name: install php mysql
    apt:
      name: php-mysql
      state: present

  - name: start apache
    service:
      name: apache2
      state: started

  - name: create php file
    copy:
      dest: /var/www/html/submit.php
      content: |
        <?php
        $conn = new mysqli("RDS_ENDPOINT","admin","Password123!","userdata");

        $name=$_POST['name'];
        $email=$_POST['email'];

        $sql="INSERT INTO users (name,email) VALUES ('$name','$email')";
        $conn->query($sql);

        echo "Data inserted successfully";
        ?>
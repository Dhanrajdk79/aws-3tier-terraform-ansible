- hosts: web
  become: yes

  tasks:

  - name: install nginx
    apt:
      name: nginx
      state: present
      update_cache: yes

  - name: start nginx
    service:
      name: nginx
      state: started

  - name: create registration form
    copy:
      dest: /var/www/html/index.html
      content: |
        <html>
        <body>
        <h2>User Registration</h2>
        <form action="http://APP_PRIVATE_IP/submit.php" method="POST">
        Name:<input type="text" name="name"><br>
        Email:<input type="text" name="email"><br>
        <input type="submit">
        </form>
        </body>
        </html>